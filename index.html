<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/images/Cawse Library.jpg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            LOGO
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

        <button id="themeToggle">
            Dark Mode
        </button>

    </header>

    <div class="dashboard-container">
        <div id="error-message" class="error-hidden">Error</div>
        <header class="search-section">
            <input class="Search" type="text" id="city-input" placeholder="Enter city name (e.g. London)">
            <button id="search-btn">Search</button>
            <button id="location-btn">📍</button>
            <button id="unitToggle">°F</button>
        </header>

        <main id="current-weather" class="weather-card hidden">
            <div class="weather-header">
                <h2 id="city-name">--</h2>
                <p id="date">--</p>
            </div>
            <div class="weather-body">
                <img id="weather-icon" src="" alt="Weather Icon">
                <h1 id="temperature">--°C</h1>
                <p id="description">--</p>
            </div>
            <div class="weather-details">
                <div class="detail"><span>Humidity </span><span id="humidity">--%</span></div>
                <div class="detail"><span>Wind </span><span id="wind-speed">-- m/s</span></div>
            </div>
        </main>

        <section id="forecast-section" class="hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecast-grid" class="forecast-grid">
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>@ 2026 Weather Dashboard | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
